<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Marks Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f14;
      --card:    #13161e;
      --border:  #1f2330;
      --accent:  #6c63ff;
      --accent2: #ff6584;
      --text:    #e8eaf0;
      --muted:   #6b7280;
      --success: #34d399;
      --error:   #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Three.js canvas sits behind everything */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── CARD ── */
    .card {
      background: rgba(19, 22, 30, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo::before {
      content: '';
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 36px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: rgba(13,15,20,0.8);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 4px;
    }
    .btn:hover  { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .msg {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }
    .msg.error   { background: rgba(248,113,113,0.12); color: var(--error);   border: 1px solid rgba(248,113,113,0.25); display: block; }
    .msg.success { background: rgba(52,211,153,0.12);  color: var(--success); border: 1px solid rgba(52,211,153,0.25);  display: block; }

    .footer-link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--muted);
    }
    .footer-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- 3D Canvas Background -->
  <canvas id="bg-canvas"></canvas>

  <div class="card">
    <div class="logo">Marks System</div>
    <h1>Welcome back 👋</h1>
    <p class="subtitle">Sign in to continue to your dashboard</p>

    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="you@gmail.com"/>

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••"/>

    <button class="btn" onclick="handleLogin()">Sign In →</button>

    <div id="msg" class="msg"></div>

    <div class="footer-link">
      Don't have an account? <a href="/register">Register here</a>
    </div>
  </div>

  <!-- Three.js via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ════════════════════════════════════════
    //  THREE.JS — FLOATING 3D SCENE
    // ════════════════════════════════════════
    const canvas   = document.getElementById('bg-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 18;

    // ── LIGHTS ──
    const ambLight = new THREE.AmbientLight(0x6c63ff, 0.4);
    scene.add(ambLight);

    const pointLight1 = new THREE.PointLight(0x6c63ff, 2, 40);
    pointLight1.position.set(10, 10, 10);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0xff6584, 1.5, 40);
    pointLight2.position.set(-10, -8, 5);
    scene.add(pointLight2);

    const pointLight3 = new THREE.PointLight(0x34d399, 1, 30);
    pointLight3.position.set(0, 10, -5);
    scene.add(pointLight3);

    // ── MATERIALS ──
    const materials = [
      new THREE.MeshStandardMaterial({ color: 0x6c63ff, wireframe: false, metalness: 0.3, roughness: 0.4 }),
      new THREE.MeshStandardMaterial({ color: 0xff6584, wireframe: false, metalness: 0.3, roughness: 0.5 }),
      new THREE.MeshStandardMaterial({ color: 0x34d399, wireframe: false, metalness: 0.4, roughness: 0.3 }),
      new THREE.MeshStandardMaterial({ color: 0xfbbf24, wireframe: false, metalness: 0.5, roughness: 0.4 }),
      new THREE.MeshStandardMaterial({ color: 0x6c63ff, wireframe: true,  opacity: 0.3, transparent: true }),
      new THREE.MeshStandardMaterial({ color: 0xff6584, wireframe: true,  opacity: 0.4, transparent: true }),
    ];

    // ── GEOMETRIES ──
    const geometries = [
      new THREE.IcosahedronGeometry(1, 0),
      new THREE.OctahedronGeometry(1, 0),
      new THREE.TetrahedronGeometry(1, 0),
      new THREE.DodecahedronGeometry(1, 0),
      new THREE.TorusGeometry(0.7, 0.25, 8, 12),
      new THREE.BoxGeometry(1.4, 1.4, 1.4),
    ];

    // ── SPAWN MESHES ──
    const meshes = [];
    const count  = 18;

    for (let i = 0; i < count; i++) {
      const geo  = geometries[i % geometries.length];
      const mat  = materials[i % materials.length].clone();
      const mesh = new THREE.Mesh(geo, mat);

      const spread = 22;
      mesh.position.set(
        (Math.random() - 0.5) * spread,
        (Math.random() - 0.5) * spread * 0.7,
        (Math.random() - 0.5) * 12 - 4
      );

      const s = 0.5 + Math.random() * 1.4;
      mesh.scale.setScalar(s);

      mesh.userData = {
        rotSpeedX: (Math.random() - 0.5) * 0.012,
        rotSpeedY: (Math.random() - 0.5) * 0.012,
        rotSpeedZ: (Math.random() - 0.5) * 0.006,
        floatSpeed: 0.4 + Math.random() * 0.6,
        floatAmp:   0.3 + Math.random() * 0.5,
        floatOffset:Math.random() * Math.PI * 2,
        originY:    mesh.position.y,
      };

      scene.add(mesh);
      meshes.push(mesh);
    }

    // ── PARALLAX ──
    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', e => {
      mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
      mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
    });

    // ── ANIMATION LOOP ──
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      meshes.forEach(m => {
        const d = m.userData;
        m.rotation.x += d.rotSpeedX;
        m.rotation.y += d.rotSpeedY;
        m.rotation.z += d.rotSpeedZ;
        // gentle float
        m.position.y = d.originY + Math.sin(t * d.floatSpeed + d.floatOffset) * d.floatAmp;
      });

      // subtle camera parallax following mouse
      camera.position.x += (mouseX * 1.5 - camera.position.x) * 0.03;
      camera.position.y += (-mouseY * 1.0 - camera.position.y) * 0.03;
      camera.lookAt(scene.position);

      renderer.render(scene, camera);
    }
    animate();

    // ── RESIZE ──
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ════════════════════════════════════════
    //  LOGIN LOGIC
    // ════════════════════════════════════════
    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const msg      = document.getElementById('msg');

      msg.className = 'msg';
      msg.textContent = '';

      if (!email || !password) {
        msg.className   = 'msg error';
        msg.textContent = 'Please fill in all fields.';
        return;
      }

      const res  = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (data.ok) {
        msg.className   = 'msg success';
        msg.textContent = 'Login successful! Redirecting...';
        setTimeout(() => window.location.href = data.redirect, 800);
      } else {
        msg.className   = 'msg error';
        msg.textContent = data.error || 'Login failed.';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
