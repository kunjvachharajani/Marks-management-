<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Marks — Marks Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f14;
      --card:    #13161e;
      --border:  #1f2330;
      --accent:  #6c63ff;
      --text:    #e8eaf0;
      --muted:   #6b7280;
      --success: #34d399;
      --error:   #f87171;
      --warn:    #fbbf24;
    }

    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    .bg-blob { position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.08; pointer-events: none; }
    .blob1 { width: 500px; height: 500px; background: var(--accent); top: -200px; right: -150px; }
    .blob2 { width: 350px; height: 350px; background: #ff6584; bottom: -100px; left: -100px; }

    /* ── NAVBAR ── */
    nav {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 64px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; display: flex; align-items: center; gap: 10px; }
    .nav-logo span { background: var(--success); color: #0d0f14; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 700; letter-spacing: 1.5px; }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-email { font-size: 13px; color: var(--muted); }
    .btn-logout { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 7px 16px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .btn-logout:hover { border-color: var(--error); color: var(--error); }

    /* ── LAYOUT ── */
    .main { max-width: 780px; margin: 0 auto; padding: 48px 24px; }

    .greeting { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; margin-bottom: 4px; }
    .greeting-sub { color: var(--muted); font-size: 15px; margin-bottom: 36px; }

    /* ── SUMMARY CARDS ── */
    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
    .sum-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px;
      animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }
    .sum-card:nth-child(2) { animation-delay: 0.06s; }
    .sum-card:nth-child(3) { animation-delay: 0.12s; }
    @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .sum-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .sum-value { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; }

    /* ── MARKS TABLE CARD ── */
    .marks-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
      animation: slideUp 0.4s 0.15s cubic-bezier(0.16,1,0.3,1) both;
    }
    .marks-card-header { padding: 22px 24px 0; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }

    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 12px 24px; text-align: left; border-bottom: 1px solid var(--border); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody td { padding: 14px 24px; font-size: 14px; }

    /* progress bar for marks */
    .marks-cell { display: flex; align-items: center; gap: 12px; }
    .marks-num { font-family: 'Syne', sans-serif; font-weight: 700; min-width: 32px; }
    .marks-bar-bg { flex: 1; height: 6px; background: var(--border); border-radius: 3px; }
    .marks-bar { height: 6px; border-radius: 3px; transition: width 0.6s ease; }

    .grade-badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; }
    .grade-A { background: rgba(52,211,153,0.15);  color: #34d399; }
    .grade-B { background: rgba(96,165,250,0.15);  color: #60a5fa; }
    .grade-C { background: rgba(251,191,36,0.15);  color: #fbbf24; }
    .grade-D { background: rgba(251,146,60,0.15);  color: #fb923c; }
    .grade-F { background: rgba(248,113,113,0.15); color: #f87171; }

    /* ── EMPTY / NOT FOUND ── */
    .empty-state { text-align: center; padding: 60px 24px; }
    .empty-icon { font-size: 48px; margin-bottom: 14px; }
    .empty-state p { color: var(--muted); font-size: 15px; line-height: 1.7; }

    @media (max-width: 480px) {
      .summary { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>

  <!-- NAVBAR -->
  <nav>
    <div class="nav-logo">Marks Management <span>STUDENT</span></div>
    <div class="nav-right">
      <span class="nav-email" id="studentEmail">—</span>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="main">

    <div class="greeting" id="greeting">Hello! 👋</div>
    <p class="greeting-sub">Here's your academic performance summary.</p>

    <!-- SUMMARY CARDS (only shown when data present) -->
    <div class="summary" id="summarySection" style="display:none">
      <div class="sum-card">
        <div class="sum-label">Subjects</div>
        <div class="sum-value" id="sumSubjects" style="color:var(--accent)">—</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">Best Score</div>
        <div class="sum-value" id="sumBest" style="color:var(--success)">—</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">Overall Avg</div>
        <div class="sum-value" id="sumAvg" style="color:var(--warn)">—</div>
      </div>
    </div>

    <!-- MARKS TABLE -->
    <div class="marks-card" id="marksCard" style="display:none">
      <div class="marks-card-header">📚 Your Marks</div>
      <table style="margin-top:14px">
        <thead>
          <tr>
            <th>Subject</th>
            <th>Marks</th>
            <th>Grade</th>
          </tr>
        </thead>
        <tbody id="marksTable"></tbody>
      </table>
    </div>

    <!-- NOT FOUND -->
    <div id="notFound" style="display:none">
      <div class="empty-state">
        <div class="empty-icon">🎓</div>
        <p>Your marks haven't been entered yet.<br>Please check back after your admin uploads your results.</p>
      </div>
    </div>

  </div>

  <script>
    const gradeColors = { A: '#34d399', B: '#60a5fa', C: '#fbbf24', D: '#fb923c', F: '#f87171' };

    window.onload = async () => {
      const meRes  = await fetch('/api/me');
      const meData = await meRes.json();

      if (meData.name || meData.email) {
        const displayName = meData.name || meData.email.split('@')[0];
        document.getElementById('greeting').textContent = `Hello, ${displayName}! 👋`;
        document.getElementById('studentEmail').textContent = meData.email;
      }

      const res  = await fetch('/api/my_marks');
      const data = await res.json();

      if (!data.ok || !data.marks || data.marks.length === 0) {
        document.getElementById('notFound').style.display = 'block';
        return;
      }

      const marks = data.marks;

      // Summary
      const best    = Math.max(...marks.map(m => m.marks));
      const avg     = Math.round(marks.reduce((a, m) => a + m.marks, 0) / marks.length);
      document.getElementById('sumSubjects').textContent = marks.length;
      document.getElementById('sumBest').textContent     = best;
      document.getElementById('sumAvg').textContent      = avg;
      document.getElementById('summarySection').style.display = 'grid';

      // Table
      const tbody = document.getElementById('marksTable');
      tbody.innerHTML = marks.map(m => `
        <tr>
          <td><strong>${m.subject}</strong></td>
          <td>
            <div class="marks-cell">
              <span class="marks-num">${m.marks}</span>
              <div class="marks-bar-bg">
                <div class="marks-bar" style="width:${m.marks}%;background:${gradeColors[m.grade] || '#6c63ff'}"></div>
              </div>
              <span style="font-size:12px;color:var(--muted)">/ 100</span>
            </div>
          </td>
          <td><span class="grade-badge grade-${m.grade}">${m.grade}</span></td>
        </tr>`).join('');

      document.getElementById('marksCard').style.display = 'block';
    };

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login';
    }
  </script>
</body>
</html>
